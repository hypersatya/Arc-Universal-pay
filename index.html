<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background: #030613; color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .app-container { max-width: 450px; width: 100%; padding: 20px; }
        .glass { background: rgba(17, 25, 45, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .btn-blue { background: #2540d9; transition: 0.2s; }
        .btn-blue:active { transform: scale(0.95); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white font-bold rounded p-1 text-[10px]">1st</div>
                <button onclick="connect()" id="connectBtn" class="text-xs bg-white/10 px-4 py-2 rounded-full border border-white/20">Connect Wallet</button>
            </div>
            <h2 class="text-lg font-black text-blue-500 italic">ARC INDI PAY</h2>
        </div>

        <div class="glass p-6 mb-6 bg-gradient-to-br from-blue-700 to-indigo-900 border-none">
            <div class="flex justify-between text-[10px] opacity-60">
                <span>WALLET ADDRESS</span>
                <span id="addr">0x...0000</span>
            </div>
            <div class="mt-4">
                <h1 class="text-4xl font-bold"><span id="usdcBal">0.00</span> <span class="text-xl">USDC</span></h1>
                <p class="text-lg opacity-80 mt-1">≈ ₹<span id="inrBal">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div onclick="openModal()" class="glass p-5 text-center cursor-pointer hover:bg-white/5 transition">
                <i class="fa-solid fa-paper-plane text-xl text-blue-400 mb-2"></i>
                <div class="text-sm font-bold">Transfer</div>
            </div>
            <div onclick="alert('Your address: ' + user)" class="glass p-5 text-center cursor-pointer hover:bg-white/5 transition">
                <i class="fa-solid fa-qrcode text-xl text-blue-400 mb-2"></i>
                <div class="text-sm font-bold">Receive</div>
            </div>
            <button onclick="alert('Camera starting...')" class="glass p-4 col-span-2 text-blue-400 font-bold">
                <i class="fa-solid fa-expand mr-2"></i> Scan & Pay
            </button>
        </div>

        <div class="glass p-5">
            <p class="text-[10px] font-bold opacity-50 mb-4 tracking-widest">LATEST 5 TRANSACTIONS</p>
            <div id="history" class="text-sm space-y-3 opacity-60 italic text-center py-4">
                No recent transactions
            </div>
        </div>

        <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
            <div class="glass p-6 w-full max-w-sm relative">
                <button onclick="closeModal()" class="absolute right-4 top-4 opacity-50 text-xl">&times;</button>
                <h3 class="text-center font-bold text-blue-400 mb-6 uppercase tracking-wider">Send Payment</h3>
                
                <input id="to" type="text" placeholder="Recipient Address (0x...)" class="w-full p-4 rounded-xl mb-4 text-sm">
                <input id="amt" type="number" oninput="calcINR(this.value)" placeholder="Amount USDC" class="w-full p-4 rounded-xl mb-1 text-2xl font-bold">
                <p class="text-xs text-blue-500 mb-6 ml-1">≈ ₹<span id="preview">0.00</span> INR</p>

                <button onclick="sendUSDC()" id="sendBtn" class="w-full btn-blue py-4 rounded-xl font-bold">Confirm Send</button>
            </div>
        </div>

        <p class="text-center text-blue-600 font-bold italic mt-10 text-sm">arc Circle Sevilla Account</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
