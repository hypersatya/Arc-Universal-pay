<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background: #030613; color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .app-container { max-width: 480px; width: 100%; padding: 20px; }
        .glass { background: rgba(17, 25, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .tool-btn { cursor: pointer; transition: 0.2s; }
        .tool-btn:active { transform: scale(0.95); background: rgba(59, 92, 255, 0.2); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="flex justify-between items-center mb-8">
            <button onclick="connectWallet()" id="connectBtn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-5 py-2 rounded-full shadow-lg shadow-blue-900/20">
                Connect Wallet
            </button>
            <h2 class="text-xl font-black text-blue-500 italic tracking-tighter uppercase">Arc Indipay</h2>
        </div>

        <div class="glass p-6 mb-6 bg-gradient-to-br from-blue-700 to-indigo-900 border-none shadow-2xl">
            <p class="text-[10px] opacity-60 mb-1 font-mono uppercase tracking-widest text-white">Wallet: <span id="walletAddr">0x...0000</span></p>
            <div class="mt-4">
                <h1 class="text-5xl font-black tracking-tight"><span id="usdcBal">100.00</span> <span class="text-2xl opacity-60">USDC</span></h1>
                <p class="text-xl font-bold mt-2 text-blue-300 italic">≈ ₹<span id="inrBal">8,350.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div onclick="openTransfer()" class="glass p-8 text-center tool-btn border-white/5">
                <i class="fa-solid fa-paper-plane text-2xl text-blue-400 mb-3"></i>
                <div class="font-bold text-sm">Transfer</div>
            </div>
            <div onclick="showMyAddress()" class="glass p-8 text-center tool-btn border-white/5">
                <i class="fa-solid fa-qrcode text-2xl text-blue-400 mb-3"></i>
                <div class="font-bold text-sm">Receive</div>
            </div>
        </div>

        <div onclick="alert('Scan & Pay feature requires HTTPS and Camera permission')" class="glass p-5 text-center tool-btn mb-6 border-blue-500/30 flex items-center justify-center gap-3">
            <i class="fa-solid fa-expand text-blue-400"></i>
            <span class="font-bold text-blue-400">Scan & Pay</span>
        </div>

        <div class="glass p-6 min-h-[140px]">
            <p class="text-[10px] font-bold opacity-40 mb-6 tracking-[0.2em] uppercase">Latest 5 Transactions</p>
            <div id="txHistory" class="text-sm opacity-40 text-center italic py-4">No recent transactions</div>
        </div>

        <div id="transferModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
            <div class="glass p-6 w-full max-w-sm border-blue-500/40">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-blue-400 italic">SEND USDC</h3>
                    <button onclick="closeTransfer()" class="text-white/50 hover:text-white text-xl">&times;</button>
                </div>
                <input id="toAddress" type="text" placeholder="Recipient 0x..." class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-blue-500 transition-all">
                <input id="sendAmount" type="number" oninput="updateInrPreview(this.value)" placeholder="Amount USDC" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-2 font-bold text-2xl outline-none focus:border-blue-500">
                <p class="text-xs text-blue-400 mb-8 font-medium ml-1">≈ ₹<span id="previewInr">0.00</span> INR</p>
                <button onclick="sendTransaction()" id="finalSendBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 uppercase italic">
                    Confirm Payment
                </button>
            </div>
        </div>

        <p class="text-center text-blue-600 font-bold italic mt-12 text-sm tracking-tight">arc Circle Sevilla Account</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
