<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arc Uni</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}
.card {
  background:#121826;
  padding:16px;
  border-radius:12px;
  margin-bottom:15px;
}
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b5cff;
  color:white;
  margin-top:10px;
}
input {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  background:#0f1423;
  color:white;
}
.tabs {
  display:flex;
  gap:6px;
}
.tab {
  flex:1;
  padding:10px;
  text-align:center;
  background:#1a2236;
  border-radius:8px;
  cursor:pointer;
}
.active {
  background:#3b5cff;
}
</style>
</head>

<body>

<h2>Arc Uni</h2>

<div class="card">
  <button onclick="connect()">Connect Wallet</button>
  <p id="addr">Not Connected</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="tab('send',this)">Send</div>
  <div class="tab" onclick="tab('multi',this)">Multi</div>
  <div class="tab" onclick="tab('scan',this)">Scan</div>
  <div class="tab" onclick="tab('receive',this)">Receive</div>
</div>

<!-- SEND -->
<div id="send" class="card">
  <input id="to" placeholder="Receiver address">
  <input id="amount" placeholder="Amount">
  <button onclick="send()">Send</button>
</div>

<!-- MULTI SEND -->
<div id="multi" class="card" style="display:none;">
  <textarea id="multiData" placeholder="address,amount per line"></textarea>
  <button onclick="multiSend()">Send All</button>
</div>

<!-- SCAN PAY -->
<div id="scan" class="card" style="display:none;">
  <input id="scanAddr" placeholder="Paste address">
  <input id="scanAmt" placeholder="Amount">
  <button onclick="scanPay()">Pay</button>
</div>

<!-- RECEIVE -->
<div id="receive" class="card" style="display:none;">
  <p>Your Address:</p>
  <p id="myAddr"></p>
</div>

<script src="app.js"></script>

</body>
</html>
