<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background: #030613; color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .app-container { max-width: 480px; width: 100%; padding: 20px; }
        .glass { background: rgba(17, 25, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .hidden { display: none; }
        .tool-btn { cursor: pointer; transition: 0.2s; }
        .tool-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="app-container">
        
        <div id="loginScreen" class="flex flex-col items-center justify-center min-h-[80vh] text-center">
            <div class="bg-blue-600 text-white font-bold rounded-2xl w-20 h-20 flex items-center justify-center text-3xl mb-6 shadow-2xl shadow-blue-500/20">1st</div>
            <h1 class="text-4xl font-black text-blue-500 italic uppercase mb-2">Arc Indipay</h1>
            <p class="text-white/50 text-sm mb-10 tracking-widest uppercase">Indian Web3 Payment App</p>
            
            <button onclick="connectWallet()" class="w-full max-w-xs bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 uppercase italic tracking-wider">
                Connect Wallet
            </button>
        </div>

        <div id="dashboard" class="hidden animate-in fade-in duration-500">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white font-bold rounded-lg px-2 py-1 text-[10px]">1st</div>
                    <span id="status" class="text-[10px] font-bold text-green-400 uppercase tracking-tighter italic">Online</span>
                </div>
                <h2 class="text-xl font-black text-blue-500 italic uppercase">Arc Indipay</h2>
            </div>

            <div class="glass p-6 mb-6 bg-gradient-to-br from-blue-700 to-indigo-900 border-none">
                <p class="text-[10px] opacity-60 mb-1 font-mono">WALLET: <span id="walletAddr">0x...</span></p>
                <div class="mt-4">
                    <h1 class="text-4xl font-black tracking-tight"><span id="usdcBal">0.00</span> <span class="text-xl opacity-60">USDC</span></h1>
                    <p class="text-lg font-bold mt-1 text-blue-300 italic">≈ ₹<span id="inrBal">0.00</span></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div onclick="openTransfer()" class="glass p-8 text-center tool-btn">
                    <i class="fa-solid fa-paper-plane text-2xl text-blue-400 mb-2"></i>
                    <div class="font-bold text-sm">Transfer</div>
                </div>
                <div onclick="alert('Wallet: ' + userAddress)" class="glass p-8 text-center tool-btn">
                    <i class="fa-solid fa-qrcode text-2xl text-blue-400 mb-2"></i>
                    <div class="font-bold text-sm">Receive</div>
                </div>
            </div>

            <div class="glass p-5 text-center tool-btn border-blue-500/30" onclick="alert('Scanner starting...')">
                <i class="fa-solid fa-expand text-blue-400 mr-2"></i>
                <span class="font-bold text-blue-400 uppercase italic">Scan & Pay</span>
            </div>

            <div class="glass p-6 min-h-[120px]">
                <p class="text-[10px] font-bold opacity-30 mb-4 tracking-widest uppercase">Latest 5 Transactions</p>
                <div class="text-sm opacity-20 text-center italic py-4" id="routeDisplay">Ready for Routing</div>
            </div>
        </div>

        <div id="transferModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
            <div class="glass p-6 w-full max-w-sm border-blue-500/40">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-blue-400 italic">SEND USDC</h3>
                    <button onclick="closeTransfer()" class="text-white/50 text-xl font-bold">&times;</button>
                </div>
                <input id="toAddress" type="text" placeholder="Recipient 0x..." class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none">
                <input id="amount" type="number" oninput="updateInrPreview(this.value)" placeholder="0.00" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-1 font-bold text-2xl outline-none">
                <p class="text-[10px] text-blue-400 mb-8 font-medium italic">≈ ₹<span id="previewInr">0.00</span> INR</p>
                <button onclick="send()" id="finalSendBtn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 uppercase italic">Confirm Payment</button>
            </div>
        </div>

        <p class="text-center text-blue-600 font-bold italic mt-12 text-[10px] opacity-50">arc Circle Sevilla Account</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
