<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY - V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    
    <style>
        body { background: #030613; color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .app-container { max-width: 480px; width: 100%; padding: 20px; }
        .glass { background: rgba(17, 25, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .hidden { display: none !important; }
        .tool-btn { cursor: pointer; transition: 0.2s; }
        .tool-btn:active { transform: scale(0.95); background: rgba(59, 92, 255, 0.1); }
        input, select { outline: none; color: white; background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="loginScreen" class="flex flex-col items-center justify-center min-h-[80vh] text-center font-bold italic uppercase">
            <div class="bg-blue-600 text-white rounded-2xl w-20 h-20 flex items-center justify-center text-3xl mb-6 shadow-2xl">1ST</div>
            <h1 class="text-4xl text-blue-500 mb-2 font-black tracking-tighter">Arc Indipay</h1>
            <button onclick="connectWallet()" class="w-full max-w-xs bg-blue-600 py-4 rounded-2xl shadow-xl text-white font-black italic">CONNECT WALLET</button>
        </div>

        <div id="dashboard" class="hidden">
            <div class="flex justify-between items-center mb-6 uppercase italic font-bold">
                <div class="flex items-center gap-2"><div class="bg-blue-600 text-white rounded px-2 py-0.5 text-[10px]">1ST</div><span class="text-[10px] text-green-400">Live</span></div>
                <h2 class="text-xl text-blue-500 font-black">Arc Indipay</h2>
            </div>

            <div class="glass p-7 mb-6 bg-gradient-to-br from-blue-700 to-indigo-900 border-none shadow-2xl">
                <p class="text-[9px] opacity-60 mb-2 font-mono uppercase tracking-widest">Address: <span id="walletAddr">0x...</span></p>
                <div class="mt-4 font-bold italic text-white uppercase tracking-tighter">
                    <h1 class="text-5xl font-black tracking-tighter"><span id="usdcBal">0.00</span> <span class="text-2xl opacity-50 font-medium">USDC</span></h1>
                    <p class="text-xl font-bold mt-2 text-blue-300">≈ ₹<span id="inrBal">0.00</span></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4 font-bold uppercase italic text-center text-white">
                <div onclick="openTransfer()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-paper-plane text-2xl text-blue-400 mb-3"></i><div class="text-sm">Transfer</div></div>
                <div onclick="openReceive()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-qrcode text-2xl text-blue-400 mb-3"></i><div class="text-sm">Receive</div></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6 font-bold uppercase italic text-center text-white">
                <div onclick="startScanner()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-expand text-2xl text-blue-400 mb-3"></i><div class="text-sm">Scan & Pay</div></div>
                <div onclick="openHistoryModal()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-clock-rotate-left text-2xl text-blue-400 mb-3"></i><div class="text-sm">History</div></div>
            </div>

            <div class="glass p-7 border-blue-500/30 text-white font-bold italic uppercase">
                <div class="flex items-center gap-3 mb-6"><i class="fa-bolt fa-solid text-blue-400"></i><h3 class="text-blue-400 text-sm">Utility Payments</h3></div>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div onclick="setupUtility('mobile')" class="glass p-5 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-mobile-screen text-blue-400 text-lg"></i><div class="text-[10px]">Mobile</div>
                    </div>
                    <div onclick="setupUtility('electricity')" class="glass p-5 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-lightbulb text-blue-400 text-lg"></i><div class="text-[10px]">Electricity</div>
                    </div>
                    <div onclick="setupUtility('dth')" class="glass p-5 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-tv text-blue-400 text-lg"></i><div class="text-[10px]">DTH</div>
                    </div>
                    <div onclick="setupUtility('broadband')" class="glass p-5 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-wifi text-blue-400 text-lg"></i><div class="text-[10px]">WiFi</div>
                    </div>
                </div>
                
                <div id="utilityBox" class="hidden mt-6 space-y-4 animate-in fade-in duration-300">
                    <p id="utilDetail" class="text-[10px] text-blue-300 lowercase italic opacity-80 text-center"></p>
                    <input id="utilNumber" type="text" placeholder="Number / Consumer ID" class="w-full p-4 rounded-xl text-xs">
                    <input id="utilAmount" type="number" placeholder="Amount (USDC)" class="w-full p-4 rounded-xl text-xl font-bold">
                    <button onclick="payUtility()" class="w-full bg-blue-600 py-4 rounded-2xl active:scale-95 shadow-xl">Pay Utility Bill</button>
                </div>
            </div>
        </div>

        <div id="historyModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex flex-col p-6 z-50 text-white">
            <div class="flex justify-between items-center mb-6 font-bold italic uppercase">
                <h3 class="text-blue-400">Transaction History (Max 100)</h3>
                <button onclick="closeModal('historyModal')" class="text-2xl">&times;</button>
            </div>
            <div id="fullTxList" class="flex-1 overflow-y-auto space-y-4 pr-2">
                <div class="text-center opacity-30 py-10 italic uppercase">Syncing Transactions...</div>
            </div>
        </div>

        <div id="transferModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-50 text-white font-bold italic uppercase">
            <div class="glass p-7 w-full max-w-sm border-blue-500/30">
                <div class="flex justify-between items-center mb-8"><h3 class="text-blue-400">Send Payment</h3><button onclick="closeModal('transferModal')" class="text-2xl font-bold">&times;</button></div>
                <input id="toAddress" type="text" placeholder="Recipient 0x..." class="w-full p-4 rounded-xl mb-4 text-xs">
                <input id="amount" type="number" oninput="updateInr(this.value)" placeholder="0.00" class="w-full p-4 rounded-xl mb-2 text-3xl">
                <p class="text-[11px] text-blue-400 mb-10 tracking-widest uppercase">≈ ₹<span id="previewInr">0.00</span></p>
                <button onclick="executePayment()" id="sendBtn" class="w-full bg-blue-600 py-4 rounded-2xl shadow-xl active:scale-95">Confirm Send</button>
            </div>
        </div>

        <div id="receiveModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-50">
            <div class="glass p-8 w-full max-w-sm border-blue-500/30 text-center">
                <h3 class="font-black text-blue-400 italic mb-6 uppercase">Your QR Code</h3>
                <div id="qrcode" class="bg-white p-4 rounded-2xl inline-block mb-6 shadow-xl"></div>
                <div id="fullAddrDisplay" class="bg-white/5 p-3 rounded-xl mb-6 truncate text-[10px] text-blue-200 font-mono"></div>
                <button onclick="copyAddr()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl active:scale-95 uppercase italic mb-2">Copy Address</button>
                <button onclick="closeModal('receiveModal')" class="text-white/20 text-[10px] uppercase font-bold">Close</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
