<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY - PRO TRAVEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background: #030613; color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .app-container { max-width: 480px; width: 100%; padding: 20px; }
        .glass { background: rgba(17, 25, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .hidden { display: none !important; }
        .tool-btn { cursor: pointer; transition: 0.2s; }
        .tool-btn:active { transform: scale(0.95); background: rgba(59, 92, 255, 0.1); }
        select, input { outline: none; color: white; background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        
        /* New Flight Card Style */
        .flight-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; cursor: pointer; }
        .flight-card:active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .flight-info-row { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="loginScreen" class="flex flex-col items-center justify-center min-h-[80vh] text-center font-bold italic uppercase">
            <div class="bg-blue-600 text-white rounded-2xl w-20 h-20 flex items-center justify-center text-3xl mb-6 shadow-2xl">1ST</div>
            <h1 class="text-4xl text-blue-500 mb-2 font-black italic tracking-tighter">Arc Indipay</h1>
            <button onclick="connectWallet()" class="w-full max-w-xs bg-blue-600 py-4 rounded-2xl shadow-xl text-white font-black italic">CONNECT WALLET</button>
        </div>

        <div id="dashboard" class="hidden animate-in fade-in duration-500">
            <div class="flex justify-between items-center mb-6 uppercase italic font-bold">
                <div class="flex items-center gap-2"><div class="bg-blue-600 text-white rounded px-2 py-0.5 text-[10px]">1ST</div><span class="text-[10px] text-green-400 font-bold uppercase">Live</span></div>
                <h2 class="text-xl text-blue-500 font-black tracking-tighter italic">Arc Indipay</h2>
            </div>

            <div class="glass p-7 mb-6 bg-gradient-to-br from-blue-700 to-indigo-900 border-none shadow-2xl text-center font-bold italic uppercase text-white">
                <p class="text-[9px] opacity-60 mb-2 font-mono tracking-widest">Wallet: <span id="walletAddrDisplay">0x...</span></p>
                <div class="mt-4 tracking-tighter">
                    <h1 class="text-5xl font-black tracking-tighter"><span id="usdcBalDisplay">0.00</span> <span class="text-2xl opacity-50">USDC</span></h1>
                    <p class="text-xl font-bold mt-2 text-blue-300">≈ ₹<span id="inrBalDisplay">0.00</span></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4 text-center text-white font-bold italic uppercase">
                <div onclick="openTransfer()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-paper-plane text-2xl text-blue-400 mb-3"></i><div class="text-sm">Transfer</div></div>
                <div onclick="openReceiveModal()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-qrcode text-2xl text-blue-400 mb-3"></i><div class="text-sm">Receive</div></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8 text-center text-white font-bold italic uppercase">
                <div onclick="startScanner()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-expand text-2xl text-blue-400 mb-3"></i><div class="text-xs">Scan & Pay</div></div>
                <div onclick="openHistoryModal()" class="glass p-8 tool-btn border-white/5"><i class="fa-solid fa-clock-rotate-left text-2xl text-blue-400 mb-3"></i><div class="text-xs">History</div></div>
            </div>

            <div class="glass p-7 mb-8 border-blue-500/30 text-white font-bold italic uppercase tracking-tighter">
                <div class="flex items-center gap-3 mb-6"><i class="fa-solid fa-plane-departure text-blue-400"></i><h3 class="text-blue-400 text-sm font-black">Travel & Transit</h3></div>
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div onclick="openPopup('flight')" class="glass py-4 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-plane text-blue-400 text-lg"></i><div class="text-[8px]">Flight</div>
                    </div>
                    <div onclick="openPopup('bus')" class="glass py-4 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-bus text-blue-400 text-lg"></i><div class="text-[8px]">Bus</div>
                    </div>
                    <div onclick="openPopup('train')" class="glass py-4 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-train text-blue-400 text-lg"></i><div class="text-[8px]">Train</div>
                    </div>
                    <div onclick="openPopup('hotel')" class="glass py-4 tool-btn border-white/5 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-hotel text-blue-400 text-lg"></i><div class="text-[8px]">Hotel</div>
                    </div>
                </div>
            </div>

            <div class="glass p-6 min-h-[160px] text-white">
                <p class="text-[10px] font-bold opacity-30 mb-4 uppercase italic text-center tracking-widest">Latest Transactions</p>
                <div id="latestTxList" class="space-y-4"></div>
            </div>
        </div>

        <div id="bookingModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-6 z-50 overflow-y-auto">
            <div class="glass p-7 w-full max-w-sm border-blue-500/30 text-white font-bold italic uppercase my-10">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modalTitle" class="text-blue-400 italic font-black">SEARCH</h3>
                    <button onclick="closeModal('bookingModal')" class="text-2xl font-bold">&times;</button>
                </div>
                
                <div id="searchFields" class="space-y-3 mb-4">
                    </div>
                
                <button id="searchBtn" onclick="searchTravel()" class="w-full bg-blue-600 py-4 rounded-xl shadow-xl font-black italic uppercase">Search</button>

                <div id="resultsList" class="hidden mt-6 space-y-3 animate-in fade-in max-h-80 overflow-y-auto pr-1">
                    <p class="text-[8px] opacity-40 text-center uppercase">Available Options:</p>
                    <div id="injectResults">
                        </div>
                </div>

                <div id="passengerSection" class="hidden mt-6 pt-6 border-t border-white/10 space-y-3 font-bold">
                    <p class="text-[10px] text-blue-400 italic" id="pSectionTitle">TRAVELLER DETAILS:</p>
                    <input type="text" id="pName" placeholder="Full Name" class="w-full p-3 rounded-lg text-xs">
                    <div class="flex gap-2">
                        <input type="number" id="pAge" placeholder="Age" class="w-1/3 p-3 rounded-lg text-xs">
                        <input type="text" id="pId" placeholder="ID (Aadhar/Passport)" class="w-2/3 p-3 rounded-lg text-xs">
                    </div>
                    <input type="text" id="pAddr" placeholder="Address" class="w-full p-3 rounded-lg text-xs">
                    <input type="email" id="pEmail" placeholder="Email ID" class="w-full p-3 rounded-lg text-xs">
                    <input type="number" id="pPhone" placeholder="Phone Number" class="w-full p-3 rounded-lg text-xs">
                </div>

                <div id="paySection" class="hidden mt-6 pt-4 border-t border-white/10 text-center">
                    <p class="text-[10px] text-blue-300 mb-3 italic" id="selectedRouteInfo"></p>
                    <button onclick="executeFinalPayment()" id="finalPayBtn" class="w-full bg-green-600 py-4 rounded-2xl shadow-xl font-black italic uppercase tracking-widest">Pay & Confirm</button>
                </div>
            </div>
        </div>

        <div id="successModal" class="fixed inset-0 bg-black/98 backdrop-blur-xl hidden flex items-center justify-center p-6 z-[100] animate-in zoom-in duration-300">
            <div class="glass p-8 w-full max-w-sm border-green-500/50 text-center font-bold italic uppercase text-white">
                <h1 class="text-blue-400 text-3xl font-black mb-4 tracking-tighter">Congratulation!</h1>
                <div class="w-20 h-20 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-green-500 shadow-2xl">
                    <i class="fa-solid fa-check text-4xl text-green-500"></i>
                </div>
                <h2 class="text-white text-3xl font-extrabold mb-1">First</h2>
                <h3 class="text-green-400 text-sm mb-6">Booking Successful</h3>
                <div class="glass p-5 bg-white/5 text-left space-y-3 border-white/5 text-xs">
                    <div class="flex justify-between"><span class="text-blue-300">Detail:</span><span id="resId">---</span></div>
                    <div class="flex justify-between pt-2 border-t border-white/5 font-black"><span class="text-blue-300 font-bold">Paid:</span><span id="resAmt" class="text-green-400 text-lg">---</span></div>
                </div>
                <button onclick="location.reload()" class="w-full bg-blue-600 mt-8 py-4 rounded-xl font-black uppercase">Home</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
