<!DOCTYPE html>
<html>
<head>
<title>Arc UniPay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>

body{
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
}

/* GRID BG */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:linear-gradient(#1e293b 1px, transparent 1px),
                   linear-gradient(90deg,#1e293b 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.2;
  z-index:-1;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.sub{
  font-size:12px;
  opacity:0.6;
}

/* BUTTON */
.btn{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#38bdf8);
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px rgba(37,99,235,0.6);
}

/* CENTER CARD */
.center{
  margin-top:20px;
  text-align:center;
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 25px rgba(59,130,246,0.3);
}

/* ACTION GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  padding:15px;
  border-radius:15px;
  text-align:center;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  box-shadow:0 0 15px rgba(59,130,246,0.5);
  cursor:pointer;
}

/* SECTION */
.section{
  margin-top:25px;
}

.list{
  background:#0f172a;
  border-radius:15px;
  padding:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #1e293b;
}

.green{color:#4ade80}

/* FOOTER */
.footer{
  margin-top:30px;
  text-align:center;
  opacity:0.6;
}

/* MOBILE */
@media(max-width:600px){
  .logo{font-size:20px}
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">ARC UNIPAY 🚀</div>
    <div class="sub">built for arc network</div>
  </div>
  <button class="btn" onclick="connect()">Connect Wallet</button>
</div>

<!-- ACTION -->
<div class="grid">
  <div class="card" onclick="faucet()">💧 Claim Faucet</div>
  <div class="card" onclick="scan()">🔍 Block Scan</div>
</div>

<!-- CENTER -->
<div class="center">
  <p id="addr">My Wallet: Not Connected</p>
  <h2 id="balance">Balance: 0 ETH</h2>
</div>

<!-- ACTION BUTTON -->
<div class="grid">
  <div class="card">⬆ Send</div>
  <div class="card">🔄 Swap</div>
  <div class="card">⬇ Receive</div>
  <div class="card">📦 Multi Send</div>
</div>

<!-- TRANSACTION -->
<div class="section">
  <h3>Transaction</h3>
  <div class="list">
    <div class="item">
      <span>Wallet</span>
      <span class="green">+1.45 ETH</span>
    </div>
  </div>
</div>

<!-- ACTIVITY -->
<div class="section">
  <h3>Recent Activities</h3>
  <div class="list">
    <div class="item">
      <span>My Wallet</span>
      <span class="green">-0.5 ETH</span>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2024 ARC ECOSYSTEM
</div>

</div>

<script>

let user;

async function connect(){
  if(!window.ethereum){
    alert("Install MetaMask");
    return;
  }

  const accounts = await window.ethereum.request({
    method:"eth_requestAccounts"
  });

  user = accounts[0];
  document.getElementById("addr").innerText = "My Wallet: " + user;

  const provider = new ethers.BrowserProvider(window.ethereum);
  const bal = await provider.getBalance(user);

  document.getElementById("balance").innerText =
    "Balance: " + ethers.formatEther(bal) + " ETH";
}

function faucet(){
  window.open("https://faucet.circle.com","_blank");
}

function scan(){
  window.open("https://testnet.arcscan.app/gas-tracker","_blank");
}

</script>

</body>
</html>
