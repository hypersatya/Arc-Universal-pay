<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background: #030613; color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .app-container { max-width: 450px; width: 100%; padding: 20px; }
        .glass { background: rgba(17, 25, 45, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .tool-card { cursor: pointer; transition: 0.2s; }
        .tool-card:active { transform: scale(0.95); background: rgba(59, 92, 255, 0.2); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="flex justify-between items-center mb-6">
            <button onclick="connect()" id="connectBtn" class="text-xs bg-blue-600 px-5 py-2 rounded-full font-bold">Connect Wallet</button>
            <h2 class="text-lg font-black text-blue-500 italic uppercase">Arc Indipay</h2>
        </div>

        <div class="glass p-6 mb-6 bg-gradient-to-br from-blue-700 to-indigo-900 border-none">
            <p class="text-[10px] opacity-60 mb-1">WALLET: <span id="addr">0x...0000</span></p>
            <h1 class="text-4xl font-bold"><span id="usdcBal">100.00</span> <span class="text-xl">USDC</span></h1>
            <p class="text-lg opacity-80">≈ ₹<span id="inrBal">8,350.00</span></p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div onclick="openTransfer()" class="glass p-8 text-center tool-card">
                <i class="fa-solid fa-paper-plane text-2xl text-blue-400 mb-2"></i>
                <div class="font-bold">Transfer</div>
            </div>
            <div onclick="showAddress()" class="glass p-8 text-center tool-card">
                <i class="fa-solid fa-qrcode text-2xl text-blue-400 mb-2"></i>
                <div class="font-bold">Receive</div>
            </div>
        </div>

        <div onclick="startScanner()" class="glass p-5 text-center tool-card mb-6 border-blue-500/30">
            <i class="fa-solid fa-expand text-blue-400 mr-2"></i>
            <span class="font-bold text-blue-400">Scan & Pay</span>
        </div>

        <div class="glass p-6">
            <p class="text-[10px] font-bold opacity-50 mb-4 tracking-tighter">LATEST 5 TRANSACTIONS</p>
            <div id="txHistory" class="text-sm opacity-40 text-center py-4 italic">No recent transactions</div>
        </div>

        <div id="payModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
            <div class="glass p-6 w-full max-w-sm border-blue-500">
                <h3 class="text-center font-bold text-blue-400 mb-6">SEND PAYMENT</h3>
                <input id="toAddr" type="text" placeholder="Recipient 0x..." class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-blue-500">
                <input id="payAmt" type="number" oninput="updateINR(this.value)" placeholder="Amount" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-2 font-bold text-2xl">
                <p class="text-xs text-blue-500 mb-8 font-medium">≈ ₹<span id="inrPreview">0.00</span> INR</p>
                <div class="flex gap-2">
                    <button onclick="closeTransfer()" class="flex-1 bg-white/10 py-4 rounded-xl font-bold">Cancel</button>
                    <button onclick="send()" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold">Send</button>
                </div>
            </div>
        </div>

        <p class="text-center text-blue-600 font-bold italic mt-12 text-sm">arc Circle Sevilla Account</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
